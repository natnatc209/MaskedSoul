<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaskedSoul - 專業真人語音直播平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Montserrat:wght@600;800&display=swap');
        :root { --theme-pink: #ec4899; --theme-gold: #f59e0b; --theme-dark: #0f172a; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .masked-avatar { filter: brightness(0.3) blur(22px); transition: all 1.5s ease; }
        .unmask-effect { filter: brightness(1) blur(0px); border: 2px solid var(--theme-gold); box-shadow: 0 0 20px var(--theme-gold); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div class="w-full max-w-[390px] h-[844px] bg-[#0b0c10] text-gray-100 rounded-[55px] shadow-3xl relative overflow-hidden flex flex-col border-[8px] border-gray-900" id="app-shell">
        <div id="intro-screen" class="absolute inset-0 z-[500] bg-[#0b0c10] flex flex-col items-center justify-center text-center transition-opacity duration-1000">
            <div class="mb-10 text-7xl animate-bounce">🎭</div>
            <h1 class="text-3xl font-black tracking-[0.4em] uppercase text-amber-500">MaskedSoul</h1>
            <p class="text-[10px] tracking-[0.3em] text-gray-500 mt-4 uppercase">Hearing Your Soul</p>
        </div>

        <div id="view-lobby" class="hidden flex-1 overflow-y-auto no-scrollbar flex flex-col relative w-full h-full pb-24 z-10">
            <div class="px-6 pt-14 pb-4 sticky top-0 bg-black/60 backdrop-blur-3xl z-30 flex justify-between items-center border-b border-white/5">
                <div class="flex items-center space-x-2">
                    <i data-lucide="venetian-mask" class="w-6 h-6 text-amber-500"></i>
                    <span class="text-xl font-black text-white italic">大廳</span>
                </div>
                <div onclick="window.switchTab('wallet')" class="flex items-center bg-gray-800/80 px-3 py-1.5 rounded-full border border-white/10 cursor-pointer">
                    <i data-lucide="diamond" class="w-3 h-3 text-purple-400 mr-2"></i>
                    <span id="lobby-balance" class="text-[11px] font-black">0</span>
                </div>
            </div>
            <div class="px-6 py-6 animate-fade">
                <div class="glass p-5 rounded-[30px] border-l-4 border-amber-500">
                    <p class="text-[9px] font-black text-amber-500 uppercase mb-2 tracking-widest">✨ AI 靈魂寄語 Soul Whisper</p>
                    <p id="ai-status-text" class="text-xs text-gray-200 leading-relaxed italic">正在感應妳的頻率...</p>
                </div>
            </div>
            <div class="px-6 grid grid-cols-2 gap-4">
                <div onclick="window.enterRoom('奧斯頓：深夜溫柔', 'https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=400')" class="relative aspect-[3/4] rounded-3xl overflow-hidden glass border border-white/5 group cursor-pointer shadow-xl">
                    <img src="https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=400" class="absolute inset-0 w-full h-full object-cover masked-avatar">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                    <p class="absolute bottom-4 left-4 text-[11px] font-bold">奧斯頓：深夜溫柔</p>
                </div>
            </div>
        </div>

        <div id="view-room" class="hidden flex-1 relative w-full h-full overflow-hidden flex flex-col z-[100] bg-black">
            <div class="absolute top-14 left-0 right-0 px-4 flex justify-between items-center z-20">
                <button onclick="window.switchTab('lobby')" class="w-10 h-10 rounded-full glass flex items-center justify-center text-white"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
                <div class="flex flex-col items-center">
                    <h2 id="room-active-title" class="text-white font-bold text-xs"></h2>
                    <div class="flex items-center text-[8px] text-amber-500 font-black animate-pulse uppercase"><i data-lucide="radio" class="w-2 h-2 mr-1"></i> Live Resonance</div>
                </div>
                <button onclick="window.getIcebreaker()" class="w-10 h-10 rounded-full glass flex items-center justify-center text-amber-500"><i data-lucide="sparkles" class="w-5 h-5"></i></button>
            </div>
            <div class="flex-1 flex flex-col items-center justify-center relative pt-20">
                <div class="relative w-40 h-40">
                    <img id="active-host-avatar" src="" class="w-full h-full rounded-full object-cover masked-avatar">
                    <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-amber-500 text-[8px] font-black px-3 py-1 rounded-full text-black">MASKED HOST</div>
                </div>
            </div>
            <div class="h-[300px] px-6 pb-10 flex flex-col justify-end relative z-20">
                <div id="room-msgs" class="flex-1 overflow-y-auto no-scrollbar mb-4 space-y-2 text-xs"></div>
                <div class="flex items-center space-x-2">
                    <input type="text" id="chatInput" placeholder="在此留下妳的呢喃..." class="flex-1 glass rounded-full px-5 py-4 text-sm text-white focus:outline-none">
                    <button onclick="window.showModal('giftModal')" class="w-12 h-12 rounded-full bg-amber-500 flex items-center justify-center text-black shadow-xl"><i data-lucide="gift" class="w-6 h-6"></i></button>
                </div>
            </div>
        </div>

        <div id="view-wallet" class="hidden flex-1 overflow-y-auto no-scrollbar px-8 py-14 pb-[110px] z-10 text-center animate-fade">
            <h1 class="text-xl font-black text-amber-500 uppercase tracking-widest mb-10">Soul Bank</h1>
            <div class="w-full glass rounded-[40px] p-8 text-left border border-amber-500/20">
                <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">當前餘額 Balance</span>
                <h1 class="text-5xl font-black text-white flex items-center mt-2"><i data-lucide="diamond" class="w-7 h-7 mr-3 text-amber-500"></i><span id="profile-balance">0</span></h1>
                <button onclick="window.executeTopup(1000)" class="mt-10 w-full py-5 bg-amber-500 text-black font-black rounded-2xl shadow-2xl active:scale-95 transition-all uppercase tracking-widest">立即測試儲值</button>
            </div>
        </div>

        <div id="bottom-nav" class="hidden absolute bottom-0 left-0 right-0 h-[90px] bg-black/80 backdrop-blur-3xl border-t border-white/5 flex justify-around items-center px-10 z-50 rounded-b-[45px]">
            <button onclick="window.switchTab('lobby')" id="tab-lobby" class="flex flex-col items-center space-y-1 text-amber-500"><i data-lucide="compass" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase">發現</span></button>
            <button onclick="window.switchTab('wallet')" id="tab-wallet" class="flex flex-col items-center space-y-1 text-gray-600"><i data-lucide="credit-card" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase">錢包</span></button>
        </div>

        <div id="giftModal" class="fixed inset-0 bg-black/90 hidden justify-center items-end z-[400] animate-fade">
            <div class="w-full glass rounded-t-[50px] p-10 border-t border-amber-500/20">
                <div class="grid grid-cols-2 gap-6 mb-8">
                    <button onclick="window.sendGift('真理之鏡', 500)" class="glass p-6 rounded-[35px] text-center border-2 border-amber-500">
                        <span class="text-4xl block mb-2">🪞</span><span class="text-[10px] font-black text-amber-400">解鎖面具</span>
                    </button>
                    <button onclick="window.sendGift('玫瑰', 10)" class="glass p-6 rounded-[35px] text-center">
                        <span class="text-4xl block mb-2">🌹</span><span class="text-[10px] font-black text-gray-500">浪漫玫瑰</span>
                    </button>
                </div>
                <button onclick="window.closeModal('giftModal')" class="w-full text-xs text-gray-600 font-bold py-2">取消</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const VERCEL_PROXY = "https://masked-soul-api.vercel.app/api/chat";
        let myBalance = 0;

        async function callGemini(prompt) {
            try {
                const res = await fetch(VERCEL_PROXY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "...";
            } catch (e) {
                return "在這裡，妳的心跳我聽得見。";
            }
        }

        window.onload = () => { updateWalletUI(); finishIntro(); };
        function updateWalletUI() {
            document.getElementById('lobby-balance').innerText = myBalance.toLocaleString();
            document.getElementById('profile-balance').innerText = myBalance.toLocaleString();
        }
        function finishIntro() {
            setTimeout(() => {
                const intro = document.getElementById('intro-screen');
                intro.classList.add('opacity-0');
                setTimeout(async () => {
                    intro.style.display = 'none';
                    window.switchTab('lobby');
                    const msg = await callGemini("妳是一位極具磁性的溫柔男神。請向深夜寂寞的女性用戶說一句感性的歡迎詞，不超過 15 字。不要符號。");
                    document.getElementById('ai-status-text').innerText = msg;
                }, 1000);
            }, 2000);
        }
        window.switchTab = (name) => {
            ['lobby', 'wallet', 'room'].forEach(t => document.getElementById(`view-${t}`)?.classList.add('hidden'));
            document.getElementById(`view-${name}`).classList.remove('hidden');
            const nav = document.getElementById('bottom-nav');
            if (name === 'room') nav.classList.add('hidden'); else nav.classList.remove('hidden');
            document.getElementById('tab-lobby').style.color = (name === 'lobby') ? '#f59e0b' : '#4b5563';
            document.getElementById('tab-wallet').style.color = (name === 'wallet') ? '#f59e0b' : '#4b5563';
        };
        window.enterRoom = (title, img) => {
            document.getElementById('room-active-title').innerText = title;
            document.getElementById('active-host-avatar').src = img;
            window.switchTab('room');
        };
        window.getIcebreaker = async () => {
            const chat = document.getElementById('room-msgs');
            chat.innerHTML += `<div class="text-amber-500 italic">✨ AI 正在感應話題...</div>`;
            const topic = await callGemini("提供一個適合在深夜與女性展開的破冰話題，10字內。不要符號。");
            chat.innerHTML += `<div class="p-3 bg-amber-500/10 rounded-2xl text-amber-200">✨ AI 推薦：${topic}</div>`;
            chat.scrollTop = chat.scrollHeight;
        };
        window.executeTopup = (amt) => { myBalance += amt; updateWalletUI(); alert('🎉 測試儲值成功！'); };
        window.sendGift = (name, price) => {
            if (myBalance < price) return alert("能量不足！");
            myBalance -= price; updateWalletUI(); window.closeModal('giftModal');
            document.getElementById('room-msgs').innerHTML += `<div class="text-amber-400 font-bold">🎁 送出【${name}】！</div>`;
            if (name === '真理之鏡') {
                const host = document.getElementById('active-host-avatar');
                host.classList.remove('masked-avatar'); host.classList.add('unmask-effect');
                setTimeout(() => { host.classList.add('masked-avatar'); host.classList.remove('unmask-effect'); }, 5000);
            }
        };
        window.showModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
    </script>
</body>
</html>
